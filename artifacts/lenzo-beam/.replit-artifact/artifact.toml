kind = "web"
previewPath = "/"
title = "Lenzo Beam Central"
version = "1.0.0"
id = "artifacts/lenzo-beam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22088
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lenzo-beam run dev"

[services.env]
PORT = "22088"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lenzo-beam", "run", "build"]
publicDir = "artifacts/lenzo-beam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
